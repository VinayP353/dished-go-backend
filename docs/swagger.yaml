basePath: /api/v1
definitions:
  models.Chef:
    properties:
      chef_profile:
        $ref: '#/definitions/models.ChefProfile'
      chef_profile_id:
        type: integer
      cookie_expiration:
        description: nanoseconds
        type: integer
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      last_login:
        type: string
      status:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  models.ChefProfile:
    properties:
      address:
        type: string
      created_at:
        type: string
      description:
        type: string
      fhs_certificate:
        description: Store file path (image/pdf)
        type: string
      first_name:
        type: string
      id:
        type: integer
      last_name:
        type: string
      preferred_name:
        type: string
      profile_picture:
        description: Store file path (.jpg, .png)
        type: string
      signature:
        description: Store file path or signature data
        type: string
      updated_at:
        type: string
      verified:
        type: boolean
    type: object
  models.CreateChefProfileRequest:
    properties:
      address:
        type: string
      description:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      preferred_name:
        type: string
    required:
    - first_name
    - last_name
    type: object
  models.CreateChefRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 8
        type: string
      username:
        minLength: 3
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - username
    type: object
  models.LoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  models.RegisterRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 8
        type: string
      username:
        minLength: 3
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - username
    type: object
  models.UpdateChefProfileRequest:
    properties:
      address:
        type: string
      description:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      preferred_name:
        type: string
      verified:
        type: boolean
    type: object
  models.UpdateChefRequest:
    properties:
      email:
        type: string
      status:
        type: string
      username:
        minLength: 3
        type: string
    type: object
host: localhost:8081
