version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dished-postgres
    environment:
      POSTGRES_USER: dishuser
      POSTGRES_PASSWORD: dishpassword
      POSTGRES_DB: dishdb
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dishuser -d dishdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dished-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dished-app
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=dishuser
      - DB_PASSWORD=dishpassword
      - DB_NAME=dishdb
      - DB_SSLMODE=disable
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_PORT=8080
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
